version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: smartdata_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartdata_nosql
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mysql:
    image: mysql:8
    container_name: smartdata_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: smartdata
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartdata_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      MYSQL_HOST: mysql
      MONGO_URI: mongodb://mongodb:27017
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./datasets:/app/datasets
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: on-failure

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: smartdata_dashboard
    ports:
      - "8501:8501"
    environment:
      API_BASE: http://backend:8000/api
    depends_on:
      - backend
    restart: on-failure

volumes:
  mongo_data:
  mysql_data:
